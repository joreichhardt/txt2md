name: Docker Build and Push
on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: 'Checkout'
      uses: 'actions/checkout@v4'

    # Authentifizierung via Workload Identity (Best Practice)
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/1068740763099/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'terraform-sa@project-84ddd43d-e408-4cb9-8cb.iam.gserviceaccount.com'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Build and Push to Artifact Registry'
      run: |
        gcloud builds submit . --tag europe-west3-docker.pkg.dev/project-84ddd43d-e408-4cb9-8cb/txt2md-repo/txt2md:latest --project=project-84ddd43d-e408-4cb9-8cb
